name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-smoke:
    name: Node Smoke Check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1) Syntax check your entry file (fast fail on syntax errors)
      - name: Syntax check entry file
        run: node --check index.js

      # 2) Smoke boot: start server briefly and ensure it doesn't crash immediately.
      #    This avoids hanging CI (we kill it after a few seconds).
      - name: Smoke boot (start then stop)
        env:
          # If your app reads PORT, this makes it deterministic.
          PORT: 3000
          NODE_ENV: test
        run: |
          set -e
          node index.js &
          APP_PID=$!
          echo "Started app with PID=$APP_PID"
          # give it a moment to crash if it will
          sleep 3
          # if process already exited, fail
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "App process exited early (crash)."
            exit 1
          fi
          # stop it cleanly
          kill "$APP_PID"
          echo "Smoke boot passed."

      # 3) Basic dependency vulnerability scan (non-blocking for now)
      - name: npm audit (non-blocking)
        run: npm audit --audit-level=high || true
